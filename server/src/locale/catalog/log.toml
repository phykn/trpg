# Engine action-validation error phrases surfaced to players.

[log."error.hp_full"]
ko = "이미 체력이 가득해 회복약을 쓸 필요가 없습니다"
en = "Health is already full, so a healing potion is not needed"

[log."error.mp_full"]
ko = "이미 마력이 가득해 마력 음료를 쓸 필요가 없습니다"
en = "Mana is already full, so a mana drink is not needed"

[log."error.affinity_too_low"]
ko = "친밀도가 부족해 거래가 되지 않습니다. 먼저 대화하거나 신뢰를 얻어야 합니다."
en = "Affinity is too low to trade. Talk first or earn their trust."

[log."error.cant_sell_equipped"]
ko = "장착 중인 물건은 팔 수 없습니다. 먼저 장착을 해제해야 합니다."
en = "Equipped items cannot be sold. Unequip them first."

[log."error.npc_not_enough_gold"]
ko = "상대의 금화가 부족해 거래할 수 없습니다. 다른 물건을 고르거나 나중에 다시 거래해야 합니다."
en = "The other party does not have enough gold to trade. Choose another item or trade later."

[log."error.not_enough_gold"]
ko = "금화가 부족해 거래할 수 없습니다. 금화를 더 모으거나 다른 물건을 고르셔야 합니다."
en = "You do not have enough gold to trade. Earn more gold or choose another item."

[log."error.trade_item_unavailable"]
ko = "상대가 그 물건을 가지고 있지 않습니다. 다른 물건을 고르거나 거래 가능한 물건을 확인해야 합니다."
en = "They do not have that item. Choose another item or check what is available for trade."

[log."error.move_unavailable"]
ko = "그곳으로 가는 길이 보이지 않습니다. 보이는 출구를 확인하고 이동해야 합니다."
en = "No visible path leads there. Check the visible exits before moving."

[log."error.item_not_in_inventory"]
ko = "그 물건을 가지고 있지 않습니다. 주변에 보이는 물건이라면 먼저 줍거나 챙겨야 합니다."
en = "You do not have that item. If it is visible nearby, pick it up first."

[log."error.unknown_item"]
ko = "그런 물건은 없습니다. 주변이나 소지품을 살펴보고 실제로 보이는 물건을 사용해야 합니다."
en = "That item does not exist. Check your surroundings or inventory and use an item that is actually visible."

[log."error.not_consumable"]
ko = "이 물건은 지금 그런 방식으로 쓸 수 없습니다. 다른 물건을 고르거나 주변을 살펴보십시오."
en = "That item cannot be used this way right now. Choose another item or look around."

[log."error.not_enough_xp"]
ko = "성장에 필요한 경험이 부족합니다"
en = "Not enough experience to grow"

[log."error.protected_target"]
ko = "보호받는 대상이라 지금은 공격할 수 없습니다. 대화하거나 주변을 살피면 다른 방법을 찾을 수 있습니다."
en = "That target is protected and cannot be attacked right now. Talk or look around to find another approach."

[log."error.max_level"]
ko = "이미 최고 레벨입니다"
en = "Already at maximum level"

[log."error.generic_block"]
ko = "지금은 그 행동이 통하지 않습니다. 주변, 대상, 소지품을 확인하거나 다른 방법을 시도해야 합니다."
en = "That action does not work right now. Check your surroundings, target, or inventory, or try another approach."
