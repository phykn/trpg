# LLM prompt input labels and history-block templates.

[prompt."history.dead_header"]
ko = "=== 사망 — 다시 등장시키거나 발화시키지 말 것 ==="

[prompt."history.summary_header"]
ko = "=== 이전 요약 ==="

[prompt."history.dialogue_header"]
ko = "=== 최근 대화 ==="

[prompt."history.corpse_line"]
ko = "- {name} (생전 발화가 아래 대화에 남아 있을 수 있으나 더 이상 말하지 않습니다)"

[prompt."history.summary_entry"]
ko = "[턴 {turn}] — {summary}"

[prompt."history.dialogue_entry"]
ko = "[턴 {turn}]\n  플레이어: {player}\n  서술자: {narrator}"

[prompt."judge.empty_history"]
ko = "(없음)"

[prompt."judge.npc_block"]
ko = "NPC: {npc_id}, 호감도: {favor}"

[prompt."judge.no_npc"]
ko = "(turn 종료 자동 체크)"

[prompt."judge.empty_objective"]
ko = "(목표 없음)"

[prompt."judge.empty_claim"]
ko = "(주장 없음)"

[prompt."judge.quest_evaluator"]
ko = """[Quest 자유 경로 판정]
Quest 목표: {objective}

Player 최근 행적:
{history}

Player 주장: {claim}
{npc_block}

다음 enum 중 하나로 판정:
- satisfied: 목표를 충분히 달성했다고 인정. 보상 지급.
- partial: 일부 진행 — progress_delta로 누적량 반환.
- rejected: 충족 근거 부족.

진행 시그널 인식: 다음 행위도 quest 진행으로 인정합니다 — 의뢰자 NPC에게 결과를 보고하는 발화, 의뢰의 핵심 조건을 충족하는 다른 우회 행위(예: 처치 대신 추방·설득). 직전 turn_log에 quest의 trigger와 매칭되는 사건이 있고, 현재 행위가 그 결과를 의뢰자에게 알리거나 의뢰 완료 의사를 표현하면 satisfied로 판정합니다.
"""

[prompt."kernel.output_language"]
ko = "All user-visible text must be Korean. Internal identifiers (JSON keys, id values, schema field names) stay English. Specific Korean register (합니다체, noun phrases, etc.) is per agent."
en = ""

[prompt."kernel.register"]
ko = "Address the player as 당신; end Korean prose sentences with ~합니다 / ~ㅂ니다 / ~입니다 (2인칭 존댓말 합니다체)."
en = ""

[prompt."kernel.world_vocab"]
ko = """When emitting Korean content, avoid anachronisms unless world/seed explicitly contains them:
- Out-of-period (always forbidden): 스마트폰, 손전등, 라디오, 총, 자동차, 노트북, 인터넷.
- Out-of-seed creatures (forbidden unless in seed): 들쥐 떼, 까마귀 떼, 거대 거미.
- Out-of-seed magic (forbidden unless in seed): 룬 문자, 낡은 비석, 고대 문자, 결계, 마법진, 차원의 문, 고대 봉인, 신성한 제단."""
en = ""
